# ==========================================================
# Snowflake Connection
# ==========================================================

snowflake:

  account: ${SNOWFLAKE_ACCOUNT}
  user: ${SNOWFLAKE_USER}

  role: CICD_DEPLOY_ROLE
  warehouse: CICD_DEPLOY_WH

  private_key_path: ${SNOWFLAKE_PRIVATE_KEY_PATH}
  private_key_passphrase: ${SNOWFLAKE_PRIVATE_KEY_PASSPHRASE}

# ==========================================================
# Snowflake Git Repository
# ==========================================================

git:

  repository_name: CONFIG_DB.SECURITY_SCH.CICD_GIT_REPO

  branch:
    DEV: dev
    PROD: main

# ==========================================================
# SchemaChange
# ==========================================================

schemachange:

  root_folder: snowflake

  history_table:
    DEV: CONFIG_DB.SCHEMACHANGE.DEV_CHANGE_HISTORY
    PROD: CONFIG_DB.SCHEMACHANGE.PROD_CHANGE_HISTORY

  create_change_history_table: true
  autocommit: true
  dry_run: false

# ==========================================================
# Deployment Order
# Object types are deployed in this order for each target.
# Folder structure drives database/schema mapping:
#   snowflake/<object_type>/<database>/<schema>/*.sql
# Snowflake database name: {ENV}_{database}
# Snowflake schema name: {schema}
# ==========================================================

deployment_order:

  - file_formats
  - stages
  - tables
  - streams
  - views
  - functions
  - storedprocedures
  - dynamic_tables
  - tasks
  - pipes
  - snowpark
  - grants

# ==========================================================
# Database layers (Jinja variables for views / dynamic_tables)
# Resolves at deploy time:
#   {{ databases.RAW }}        -> DEV_RAW on dev, PROD_RAW on main
#   {{ databases.TRANSFORM }}  -> DEV_TRANSFORM / PROD_TRANSFORM
#   {{ databases.CONSUMPTION }} -> DEV_CONSUMPTION / PROD_CONSUMPTION
# Use in cross-layer SELECTs inside views and dynamic table DDL.
# ==========================================================

database_layers:

  - RAW
  - TRANSFORM
  - CONSUMPTION

# ==========================================================
# Access roles (Jinja variables for snowflake/grants/**/*.sql)
# Pattern: AR_{ENV}_{LAYER}_{SCHEMA}_{PRIVILEGE}
#   ENV:        DEV / PROD (from branch)
#   LAYER:      RAW / TRF / CON (from folder: RAW, TRANSFORM, CONSUMPTION)
#   SCHEMA:     CUSTOMERHUB, HUBSPOT, etc. (from schema folder name)
#   PRIVILEGE:  ALL / RO / RW
#
# In grant SQL use:
#   {{ grant_role }}           -> default RW role for current folder target
#   {{ access_roles.RW }}      -> explicit read-write role
#   {{ access_roles.RO }}      -> read-only role
#   {{ access_roles.ALL }}     -> full access role
# ==========================================================

access_roles:

  default_privilege: RW

  layer_codes:
    RAW: RAW
    TRANSFORM: TRF
    CONSUMPTION: CON

  schema_codes:
    CUSTOMER_HUB: CUSTOMERHUB
    HUBSPOT: HUBSPOT
    QUICKBOOKS: QUICKBOOKS
    ASANA: ASANA
    UTILS: SDT

# ==========================================================
# Logging
# ==========================================================

logging:

  level: INFO

# ==========================================================
# Features
# ==========================================================

features:

  validate_before_deploy: true
  fetch_git_repository: true
