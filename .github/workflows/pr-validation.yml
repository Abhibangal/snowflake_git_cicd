name: Pull Request Validation

on:
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:

    runs-on: ubuntu-latest

    steps:

    ############################################################
    # Checkout Repository
    ############################################################

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    ############################################################
    # Setup Python
    ############################################################

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    ############################################################
    # Cache Dependencies
    ############################################################

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

    ############################################################
    # Install Dependencies
    ############################################################

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    ############################################################
    # Repository Validation
    ############################################################

    - name: Validate Repository Structure
      run: |
        python deployment/validation/validate_repository.py

    ############################################################
    # Version Validation
    ############################################################

    - name: Validate Migration Versions
      run: |
        python deployment/validation/validate_versions.py

    ############################################################
    # Database Placeholder Validation
    ############################################################

    - name: Validate Database Placeholders
      run: |
        python deployment/validation/validate_database_placeholders.py


    ############################################################
    # Python Lint
    ############################################################

    - name: Run Ruff
      run: |
        ruff check python/
        ruff check deployment/

    ############################################################
    # Python Formatting
    ############################################################

    - name: Verify Formatting
      run: |
        black --check python/
        black --check deployment/

    ############################################################
    # YAML Validation
    ############################################################

    - name: Validate YAML Files
      run: |
        python deployment/validation/validate_yaml.py

    ############################################################
    # SQL Naming Convention Validation
    ############################################################

    - name: Validate SQL File Naming
      run: |
        python deployment/validation/validate_sql_naming.py

    ############################################################
    # Success
    ############################################################

    - name: Validation Successful
      run: |
        echo "Repository validation completed successfully."