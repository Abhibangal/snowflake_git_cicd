# ==========================================================
# SchemaChange Configuration
# ==========================================================

# Root folder containing all Snowflake objects
root_folder: snowflake

# Enable verbose SchemaChange logs
verbose: true

# Execute all migrations in a transaction where applicable
autocommit: true

# Execute actual deployment
# Set to true only for testing
dry_run: false

# SchemaChange History Table Name
# Environment prefix (DEV_/PROD_) will be added dynamically
history_table: CHANGE_HISTORY

# Versioned Migration Prefix
versioned_file_prefix: V

# Repeatable Migration Prefix
repeatable_file_prefix: R

# Migration Separator
migration_separator: "__"

# SQL File Extension
file_extension: ".sql"